# ============================================================
# 本地开发配置（含敏感信息，勿提交 Git）
# 用法：复制此文件为 application-local.yaml 并填入实际值
# ============================================================

custom:
  api-keys:
    dashscope: your_dashscope_api_key  # 阿里云 DashScope API Key
    bigmodel: your_bigmodel_api_key

# 如需覆盖其他配置可在此添加，例如：
spring:
  datasource:
   url: jdbc:postgresql://localhost:5432/astra
   username: postgres
   password: your_password
#
# knowledge-base:
#   rag:
#     enabled: true
#     similarity-threshold: 0.5
#     top-k: 5

# 阿里云 OSS 配置（文件上传，密钥勿提交 Git）
oss:
  access-key-id: your_oss_access_key_id
  access-key-secret: your_oss_access_key_secret
  bucket: your_bucket_name
  region: oss-cn-hangzhou
  endpoint: https://oss-cn-hangzhou.aliyuncs.com
  custom-domain: https://cdn.yourdomain.com          # 可选：CDN 或自定义域名
  max-file-size: 10485760                              # 可选：最大文件大小（默认 10MB）
