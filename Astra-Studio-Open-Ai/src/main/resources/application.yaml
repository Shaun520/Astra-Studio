spring:
  application:
    name: Astra-Studio-Open-Ai
  profiles:
    active: local
  jpa:
    open-in-view: false
server:
  port: 8089
  servlet:
    context-path: /api
sse:
  timeout-ms: 300000
# OpenAI-compatible HTTP API（阿里云 DashScope 兼容模式示例）。
# 密钥不要写进仓库：通过环境变量 DASHSCOPE_API_KEY 提供，并激活 profile「llm」。
# 本地示例：set DASHSCOPE_API_KEY=sk-xxx  且  --spring.profiles.active=llm
langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: deepseek-v4-flash
      log-requests: true
      log-responses: true
      api-key: ${custom.api-keys.dashscope}
      return-thinking: true
      timeout: 5m
      max-retries: 2
      reasoning-effort: low
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: deepseek-v4-flash
      api-key: ${custom.api-keys.dashscope}
      return-thinking: false
      timeout: 5m
      max-retries: 2
      log-requests: true
      log-responses: true

# 自动路由配置（基于任务类型的智能模型选择）
auto-routing:
  enabled: true
  confidence-threshold: 0.4
  default-model: glm-5.1
  rules-file: classpath:intent-rules.yaml
  rules-hot-reload: false

# 对话持久化配置（MySQL/PostgreSQL + Redis + Kryo）
conversation:
  persistence:
    enabled: true
    redis-ttl-hours: 24
    async-flush: true
  default-model: deepseek-v4-flash
  title:
    auto-generate: true
    max-length: 30
    model-name: deepseek-v4-flash
    timeout-seconds: 10

# 知识库 RAG 配置（文档 ETL + 向量检索 + RAG 增强）
knowledge-base:
  rag:
    enabled: true
    embedding-model: text-embedding-v3
    embedding-dimensions: 1024
    chunk-size: 512
    chunk-overlap: 64
    batch-size: 10
    top-k: 5
    similarity-threshold: 0.5
    retrieval-timeout-ms: 3000
    cache-ttl-seconds: 30

  # 多模态 Embedding 配置（用于图片向量化）
  multimodal-embedding:
      enabled: true
      model-name: qwen3-vl-embedding
      dimensions: 1024
      api-endpoint: https://dashscope.aliyuncs.com/api/v1/services/embeddings/multimodal-embedding/multimodal-embedding
      timeout-seconds: 30
      max-retries: 3
      instruct: "用于RAG检索的图片内容描述"
      max-file-size: 5MB
      supported-formats: jpg,png,webp
      max-batch-count: 10

  # 视觉模型配置（用于生成图片文字描述）
  vision-model:
    enabled: true
    model-name: qwen-vl-max-latest
    api-endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions

# 多工具生态系统配置（@Tool 工具集 + ToolRegistry）
tools:
  enabled: true
  default-timeout-ms: 60000
  max-concurrent-executions: 10
  disabled-list: []
  # 单个工具可通过 @Tool(timeout = xxx) 覆盖全局超时
  # 并发控制基于 Semaphore，达到上限时阻塞等待

# 图片分析工具配置（ImageAnalyzerTool）- 使用 DashScope/OpenAI Vision API
image-analyzer:
  api-key: ${custom.api-keys.dashscope}
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model: qwen-vl-max-latest
  timeout-ms: 30000
# 网页抓取工具配置（WebScraperTool）
web-scraper:
  timeout-ms: 10000
  max-retries: 2
  min-request-interval-ms: 1000
  max-content-size-bytes: 5242880  # 5MB
  allowed-domains: []  # 空表示允许所有域名
  blocked-domains: []
  follow-redirects: true
  user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

# PDF生成工具配置（PdfGeneratorTool）
pdf-generator:
  default-font-size: 11
  margin-mm: 15
  page-format: A4
  max-pages: 100
  output-quality: high
