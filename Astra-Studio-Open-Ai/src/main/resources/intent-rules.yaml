intents:
  CODE_GENERATION:
    keywords:
      - ["写代码", "编程", "code", "implement", "debug", "修复bug", "写个程序", "开发", "编写", "实现"]
      - ["Python", "Java", "JavaScript", "SQL", "算法", "数据结构", "函数", "方法", "类", "API", "接口", "框架", "TypeScript", "Go", "Rust", "C++", "React", "Vue", "Spring"]
      - ["排序", "递归", "循环", "数组", "链表", "树", "图", "哈希", "栈", "队列", "二叉树", "动态规划", "贪心"]
      - ["变量", "对象", "实例", "继承", "多态", "封装", "异步", "同步", "回调", "Promise", "async", "await"]
    patterns:
      - "帮我写.*(函数|方法|类|脚本|程序|代码|接口|组件|程序)"
      - "如何实现.*"
      - ".*怎么写(代码|程序|脚本|接口)"
      - "(编写|开发|实现).*(功能|模块|系统|应用|算法|程序)"
      - ".*(代码|程序)示例"
      - "用.*(语言|框架).*(写|开发|实现)"
    weight: 0.95
    target_model: "deepseek-v4-flash"
    description: "代码生成、逻辑推理、数学计算、技术实现"

  CHINESE_QA:
    keywords:
      - ["解释", "什么是", "为什么", "如何", "翻译", "总结", "说明", "介绍", "定义", "阐述", "描述"]
      - ["历史", "文化", "政治", "经济", "地理", "人物", "事件", "原理", "概念", "理论", "思想"]
      - ["意思", "含义", "区别", "联系", "关系", "影响", "作用", "特点", "特征", "优势", "劣势"]
      - ["比较", "对比", "分析", "评价", "看法", "观点", "建议", "推荐"]
    patterns:
      - "(解释|说明).*是什么"
      - ".*的意思(是|是什么)"
      - "(翻译|把.*翻译成)"
      - "(总结|概括一下).*"
      - ".*(和|与).*有什么区别"
      - "(分析|评价).*(优缺点|好坏|利弊)"
      - '.*怎么样\?'
    weight: 0.9
    target_model: "qwen3.6-flash-2026-04-16"
    description: "中文理解、文本生成、知识问答、文化相关"

  GENERAL_CHAT:
    keywords:
      - ["你好", "嗨", "hi", "hello", "早上好", "晚上好", "谢谢", "感谢", "再见", "拜拜"]
      - ["天气", "时间", "日期", "新闻", "最近", "今天", "明天", "昨天"]
      - ["哈哈", "呵呵", "笑死", "厉害", "牛逼", "不错", "可以", "好的", "OK", "ok"]
    patterns:
      - "^(你好|嗨|Hi|Hello).*"
      - ".*天气.*样"
    weight: 0.75
    target_model: "glm-5.1"
    description: "通用对话、多轮交互、日常闲聊（兜底类别）"
